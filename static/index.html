<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Traceroute Visualizer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-black m-0 p-0 overflow-hidden">
  <div id="map" class="absolute inset-0"></div>

  <!-- Full-height sidebar -->
  <div id="sidebar" class="absolute left-0 top-0 h-screen w-72 bg-slate-950/90 border-r border-slate-800 z-[1000] flex flex-col overflow-hidden text-slate-200 shadow-2xl backdrop-blur-md">
    <!-- Controls header -->
    <div id="sidebarControls" class="p-3 border-b border-slate-800 shrink-0">
      <h1 class="text-white text-xs font-bold mb-2 tracking-wider uppercase">Traceroute Visualizer</h1>
      <div class="space-y-1.5">
        <label class="text-slate-500 text-[8px] uppercase tracking-wider">Destination</label>
        <select id="targetSelect" class="target-select w-full border border-slate-700 text-slate-300 text-xs rounded-md px-2 py-1.5 bg-slate-900 focus:outline-none focus:border-cyan-500/50">
          <option value="">Select a target...</option>
        </select>
        <div id="traceProgress" class="text-cyan-400/60 text-[9px] font-mono hidden h-3 pl-1"></div>
        <div class="flex gap-1.5">
          <button id="traceBtn" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-medium px-3 py-1.5 rounded-md transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed">
            Trace Route
          </button>
          <button id="clearBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-400 text-xs px-2.5 py-1.5 rounded-md transition-all duration-200">
            Clear
          </button>
        </div>
      </div>
    </div>

    <!-- Scrollable hop list -->
    <div id="hopList" class="flex-1 overflow-y-auto custom-scrollbar">
      <div class="p-2 space-y-1" id="hopEntries">
        <div class="text-slate-600 text-[10px] font-mono">Ready. Select a destination and click Trace Route.</div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
